<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fas fa-microphone-alt text-6xl text-purple-600 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800">POS - Nhân Viên</h1>
            <p class="text-gray-600 mt-2">Hệ thống quản lý Karaoke</p>
        </div>
        
        <form ng-submit="login()" class="space-y-6">
            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập</label>
                <input type="text" 
                       ng-model="credentials.username" 
                       required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent"
                       placeholder="Nhập tên đăng nhập">
            </div>
            
            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
                <input type="password" 
                       ng-model="credentials.password" 
                       required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent"
                       placeholder="Nhập mật khẩu">
            </div>
            
            <!-- Error Message -->
            <div ng-if="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <i class="fas fa-exclamation-circle mr-2"></i>{{error}}
            </div>
            
            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                <i class="fas fa-sign-in-alt mr-2"></i>Đăng nhập
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>© 2025 Karaoke Management System</p>
        </div>
    </div>
</div>
