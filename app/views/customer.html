<!-- Customer QR Ordering Interface - Mobile Portrait -->
<div class="min-h-screen bg-gradient-to-br from-purple-600 to-blue-600 flex flex-col">
    <!-- Error State -->
    <div ng-if="error" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 text-center max-w-sm">
            <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Lỗi</h2>
            <p class="text-gray-600">{{error}}</p>
        </div>
    </div>
    
    <!-- Main Interface -->
    <div ng-if="!error" class="flex-1 flex flex-col">
        <!-- Header -->
        <div class="bg-white shadow-lg px-4 py-4">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">{{room.name}}</h1>
                    <p class="text-sm text-gray-600">Gọi món trực tuyến</p>
                </div>
                <div class="relative">
                    <button ng-click="toggleCart()" class="bg-purple-600 text-white px-4 py-3 rounded-full shadow-lg hover:bg-purple-700 transition-colors">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span ng-if="totalItems > 0" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">
                            {{totalItems}}
                        </span>
                    </button>
                </div>
            </div>
            
            <!-- Search -->
            <input type="text" 
                   ng-model="searchQuery" 
                   ng-change="searchMenu()"
                   placeholder="Tìm món ăn, đồ uống..." 
                   class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-purple-600 focus:border-transparent">
        </div>
        
        <!-- Categories -->
        <div class="bg-white shadow px-4 py-3 flex space-x-2 overflow-x-auto no-scrollbar">
            <button ng-repeat="category in categories" 
                    ng-click="selectCategory(category)"
                    class="px-4 py-2 rounded-full font-semibold whitespace-nowrap transition-colors"
                    ng-class="selectedCategory.id === category.id ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'">
                <i class="fas {{category.icon}} mr-1"></i>{{category.name}}
            </button>
        </div>
        
        <!-- Menu Items -->
        <div class="flex-1 overflow-y-auto p-4">
            <div class="space-y-3">
                <div ng-repeat="item in menuItems" 
                     class="bg-white rounded-xl shadow-md p-4 flex items-center space-x-4">
                    <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-blue-400 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas {{selectedCategory.icon}} text-3xl text-white"></i>
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-gray-800 text-lg mb-1">{{item.name}}</h3>
                        <div class="flex items-center justify-between">
                            <span class="text-purple-600 font-bold text-xl">{{item.price | number:0}}đ</span>
                            <span class="text-gray-500 text-sm">Còn: {{item.stock}} {{item.unit}}</span>
                        </div>
                    </div>
                    
                    <button ng-click="addToCart(item)" 
                            class="bg-purple-600 hover:bg-purple-700 text-white w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 shadow-lg transition-colors">
                        <i class="fas fa-plus text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="bg-white border-t border-gray-200 px-4 py-3 grid grid-cols-2 gap-3">
            <button ng-click="callStaff()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-colors">
                <i class="fas fa-hand-paper mr-2"></i>Gọi nhân viên
            </button>
            <button ng-click="requestPayment()" 
                    class="bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition-colors">
                <i class="fas fa-money-bill-wave mr-2"></i>Yêu cầu thanh toán
            </button>
        </div>
    </div>
    
    <!-- Cart Sidebar -->
    <div ng-if="showCart" 
         class="fixed inset-0 bg-black bg-opacity-50 z-50"
         ng-click="toggleCart()">
        <div ng-click="$event.stopPropagation()" 
             class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col">
            
            <!-- Cart Header -->
            <div class="bg-purple-600 text-white px-6 py-4 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold">Giỏ hàng</h2>
                    <p class="text-sm opacity-90">{{totalItems}} món</p>
                </div>
                <button ng-click="toggleCart()" class="text-white hover:bg-purple-700 w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            
            <!-- Cart Items -->
            <div class="flex-1 overflow-y-auto p-4">
                <div ng-if="cart.length === 0" class="text-center text-gray-400 py-12">
                    <i class="fas fa-shopping-cart text-6xl mb-4 opacity-50"></i>
                    <p class="text-lg">Giỏ hàng trống</p>
                </div>
                
                <div ng-repeat="item in cart" class="bg-gray-50 rounded-lg p-4 mb-3">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-gray-800 flex-1">{{item.name}}</h3>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <button ng-click="updateQuantity(item, -1)" 
                                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 w-10 h-10 rounded-lg font-bold">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span class="text-xl font-bold w-12 text-center">{{item.quantity}}</span>
                            <button ng-click="updateQuantity(item, 1)" 
                                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 w-10 h-10 rounded-lg font-bold">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <span class="text-purple-600 font-bold text-xl">{{item.price * item.quantity | number:0}}đ</span>
                    </div>
                    
                    <div class="mt-3">
                        <input type="text" 
                               ng-model="item.note" 
                               placeholder="Ghi chú (thêm đá, không cay...)" 
                               class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>
            </div>
            
            <!-- Cart Footer -->
            <div class="border-t border-gray-200 p-4">
                <div class="bg-gray-50 rounded-lg p-4 mb-4">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600 font-semibold">Tổng cộng:</span>
                        <span class="text-purple-600 font-bold text-2xl">{{total | number:0}}đ</span>
                    </div>
                </div>
                
                <button ng-click="sendOrder()" 
                        ng-disabled="cart.length === 0"
                        class="w-full bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white py-4 rounded-lg font-bold text-lg transition-colors">
                    <i class="fas fa-paper-plane mr-2"></i>Gửi order
                </button>
            </div>
        </div>
    </div>
</div>
