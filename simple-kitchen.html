<!DOCTYPE html>
<html ng-app="karaApp">
<head>
    <title>Simple Kitchen Test</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body>
    <div ng-controller="SimpleKitchenController" class="p-4">
        <h1 class="text-2xl font-bold mb-4">Simple Kitchen Test</h1>

        <!-- Rooms View -->
        <div ng-if="view === 'rooms'">
            <h2 class="text-xl mb-2">Rooms</h2>
            <div ng-repeat="room in rooms" class="border p-2 mb-2">
                <span>{{room.name}} - {{room.status}}</span>
                <button ng-if="room.status === 'occupied'" ng-click="selectRoom(room)" class="bg-blue-500 text-white px-2 py-1 ml-2">Select</button>
            </div>
        </div>

        <!-- Room Items View -->
        <div ng-if="view === 'room-items'">
            <h2 class="text-xl mb-2">Room: {{selectedRoom.name}}</h2>
            <button ng-click="switchView('rooms')" class="bg-gray-500 text-white px-2 py-1 mb-2">Back to Rooms</button>

            <div ng-if="sentItems.length === 0" class="text-gray-500">
                No items found for this room.
            </div>

            <div ng-repeat="item in sentItems" class="border p-2 mb-2">
                <div class="flex justify-between">
                    <span>{{item.name}} x{{item.quantity}} ({{item.unit}})</span>
                    <span>{{item.price | currency}}</span>
                </div>
                <div ng-if="item.note" class="text-sm text-gray-600">Note: {{item.note}}</div>
                <div class="text-sm">Status: {{item.status}}</div>
            </div>

            <div ng-if="sentItems.length > 0" class="mt-4 font-bold">
                Total: {{orderTotal | currency}}
            </div>
        </div>
    </div>

    <script>
        angular.module('karaApp', []).service('StorageService', function() {
            this.get = function(key) {
                return JSON.parse(localStorage.getItem(key) || '[]');
            };
            this.set = function(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
            };
        }).service('RoomService', ['StorageService', function(StorageService) {
            this.getRooms = function() {
                return StorageService.get('rooms');
            };
        }]).controller('SimpleKitchenController', ['$scope', 'StorageService', 'RoomService',
            function($scope, StorageService, RoomService) {
                console.log('SimpleKitchenController initialized');

                $scope.view = 'rooms';
                $scope.rooms = RoomService.getRooms();
                $scope.selectedRoom = null;
                $scope.sentItems = [];
                $scope.orderTotal = 0;

                // Display items function
                function displayItems(items) {
                    console.log('displayItems called with', items.length, 'items');

                    // Group items by productId and note
                    var groupedItems = {};
                    items.forEach(function(item) {
                        var key = item.productId + '|' + (item.note || '');
                        if (!groupedItems[key]) {
                            groupedItems[key] = {
                                id: item.id,
                                productId: item.productId,
                                name: item.name,
                                quantity: 0,
                                unit: item.uomId || 'phần',
                                price: item.unitPrice || item.price || 0,
                                note: item.note || '',
                                status: item.status || 'pending',
                                addedAt: item.createdAt || item.updatedAt || new Date(),
                                createdAt: item.createdAt || item.updatedAt || new Date(),
                                updatedAt: item.updatedAt || new Date(),
                                isTimeBased: item.isTimeBased || false,
                                timeBasedConfig: item.timeBasedConfig || null,
                                startTime: item.createdAt || item.updatedAt || new Date()
                            };
                        }
                        groupedItems[key].quantity += item.quantity;
                    });

                    // Convert to array
                    $scope.sentItems = Object.values(groupedItems).map(function(item) {
                        var itemSubtotal = item.quantity * item.price;
                        return {
                            id: item.id,
                            name: item.name,
                            quantity: item.quantity,
                            unit: item.unit,
                            price: item.price,
                            unitPrice: item.price,
                            subtotal: itemSubtotal,
                            note: item.note,
                            status: item.status,
                            addedAt: item.addedAt,
                            createdAt: item.createdAt,
                            updatedAt: item.updatedAt,
                            isTimeBased: item.isTimeBased,
                            timeBasedConfig: item.timeBasedConfig,
                            startTime: item.startTime
                        };
                    });

                    $scope.orderTotal = $scope.sentItems.reduce(function(total, item) {
                        return total + item.subtotal;
                    }, 0);

                    console.log('📊 Displayed', $scope.sentItems.length, 'grouped items, Total:', $scope.orderTotal);
                }

                $scope.switchView = function(view) {
                    $scope.view = view;
                    if (view === 'rooms') {
                        $scope.selectedRoom = null;
                        $scope.sentItems = [];
                    }
                };

                $scope.selectRoom = function(room) {
                    if (room.status !== 'occupied') {
                        alert('Room not occupied!');
                        return;
                    }

                    $scope.selectedRoom = room;
                    $scope.view = 'room-items';

                    // Load items
                    $scope.loadRoomItems();
                };

                $scope.loadRoomItems = function() {
                    console.log('loadRoomItems called');
                    if (!$scope.selectedRoom || !$scope.selectedRoom.saleOrderId) {
                        console.log('No selected room or saleOrderId');
                        $scope.sentItems = [];
                        $scope.orderTotal = 0;
                        return;
                    }

                    var saleOrderId = $scope.selectedRoom.saleOrderId;
                    console.log('Loading items for room:', $scope.selectedRoom.name, 'order:', saleOrderId);

                    // Load from localStorage
                    var allItems = StorageService.get('saleorderitems');
                    var localOrderItems = allItems.filter(function(item) {
                        return item.saleOrderId === saleOrderId;
                    });

                    console.log('Found', localOrderItems.length, 'items in localStorage');

                    // Display items
                    displayItems(localOrderItems);
                };
            }
        ]);
    </script>
</body>
</html>
