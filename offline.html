<!-- Offline fallback page -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Karaoke POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="text-center text-white p-8">
        <i class="fas fa-wifi-slash text-8xl mb-6 opacity-50"></i>
        <h1 class="text-4xl font-bold mb-4">Không có kết nối</h1>
        <p class="text-xl text-gray-400 mb-8">Vui lòng kiểm tra kết nối mạng của bạn</p>
        <button onclick="location.reload()" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-lg font-bold text-lg">
            <i class="fas fa-sync-alt mr-2"></i>Thử lại
        </button>
    </div>
</body>
</html>
