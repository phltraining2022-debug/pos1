<!DOCTYPE html>
<html>
<head>
    <title>Test Kitchen Logic</title>
</head>
<body>
    <h1>Test Kitchen Logic</h1>
    <button onclick="testFullFlow()">Test Full Kitchen Flow</button>
    <div id="output"></div>

    <script>
        // Mock StorageService
        const StorageService = {
            get: function(key) {
                return JSON.parse(localStorage.getItem(key) || '[]');
            },
            set: function(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
            }
        };

        // Mock displayItems function from kitchen controller
        function displayItems(items) {
            console.log('displayItems called with', items.length, 'items');

            // Group items by productId and note
            var groupedItems = {};
            items.forEach(function(item) {
                var key = item.productId + '|' + (item.note || '');
                if (!groupedItems[key]) {
                    groupedItems[key] = {
                        id: item.id,
                        productId: item.productId,
                        name: item.name,
                        quantity: 0,
                        unit: item.uomId || 'phần',
                        price: item.unitPrice || item.price || 0,
                        note: item.note || '',
                        status: item.status || 'pending',
                        addedAt: item.createdAt || item.updatedAt || new Date(),
                        createdAt: item.createdAt || item.updatedAt || new Date(),
                        updatedAt: item.updatedAt || new Date(),
                        isTimeBased: item.isTimeBased || false,
                        timeBasedConfig: item.timeBasedConfig || null,
                        startTime: item.createdAt || item.updatedAt || new Date()
                    };
                }
                groupedItems[key].quantity += item.quantity;
            });

            // Convert to array
            var sentItems = Object.values(groupedItems).map(function(item) {
                var itemSubtotal = item.quantity * item.price;

                return {
                    id: item.id,
                    name: item.name,
                    quantity: item.quantity,
                    unit: item.unit,
                    price: item.price,
                    unitPrice: item.price,
                    subtotal: itemSubtotal,
                    note: item.note,
                    status: item.status,
                    addedAt: item.addedAt,
                    createdAt: item.createdAt,
                    updatedAt: item.updatedAt,
                    isTimeBased: item.isTimeBased,
                    timeBasedConfig: item.timeBasedConfig,
                    startTime: item.startTime
                };
            });

            var orderTotal = sentItems.reduce(function(total, item) {
                return total + item.subtotal;
            }, 0);

            console.log('📊 Kitchen displayed', sentItems.length, 'grouped items, Total:', orderTotal);
            return { sentItems: sentItems, orderTotal: orderTotal };
        }

        // Test function
        function testDisplayItems() {
            // Get items from localStorage
            const allItems = StorageService.get('saleorderitems');
            const testOrderItems = allItems.filter(item => item.saleOrderId === 'test-order-123');

            console.log('Found items for test-order-123:', testOrderItems);

            const result = displayItems(testOrderItems);

        function testFullFlow() {
            console.log('Testing full kitchen flow...');

            // 1. Check rooms
            const rooms = StorageService.get('rooms');
            console.log('Rooms in localStorage:', rooms);

            const occupiedRooms = rooms.filter(r => r.status === 'occupied');
            console.log('Occupied rooms:', occupiedRooms);

            if (occupiedRooms.length === 0) {
                document.getElementById('output').innerHTML = 'No occupied rooms found!';
                return;
            }

            // 2. Select first occupied room
            const selectedRoom = occupiedRooms[0];
            console.log('Selected room:', selectedRoom);

            // 3. Load items for this room
            const allItems = StorageService.get('saleorderitems');
            const roomItems = allItems.filter(item => item.saleOrderId === selectedRoom.saleOrderId);
            console.log('Items for room:', roomItems);

            // 4. Display items
            const result = displayItems(roomItems);

            document.getElementById('output').innerHTML =
                '<h2>Full Flow Test Results:</h2>' +
                '<p>Occupied rooms: ' + occupiedRooms.length + '</p>' +
                '<p>Selected room: ' + selectedRoom.name + ' (ID: ' + selectedRoom.id + ')</p>' +
                '<p>SaleOrderId: ' + selectedRoom.saleOrderId + '</p>' +
                '<p>Items found: ' + roomItems.length + '</p>' +
                '<p>Grouped items: ' + result.sentItems.length + '</p>' +
                '<p>Total: ' + result.orderTotal + '</p>' +
                '<pre>Room: ' + JSON.stringify(selectedRoom, null, 2) + '</pre>' +
                '<pre>Items: ' + JSON.stringify(result.sentItems, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
